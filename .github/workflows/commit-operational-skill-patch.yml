name: Commit validated operational skill patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: agent/operational-skill-adapters
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install migration dependency
        run: python -m pip install "PyYAML>=6.0.2,<7"

      - name: Apply and finalize migration
        run: |
          python scripts/apply-operational-adapters.py
          python scripts/finalize-operational-adapters.py
          bash scripts/sync-packaged-skills.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            mcp-server/package-lock.json
            visualizer/package-lock.json

      - name: Validate repository
        run: |
          chmod +x scripts/*.sh hooks/*.sh scripts/*.py
          bash scripts/check-repo-health.sh

      - name: Remove migration-only files
        run: |
          rm -f .trigger-operational-adapters
          rm -f scripts/apply-operational-adapters.py
          rm -f scripts/finalize-operational-adapters.py

      - name: Commit source patch without workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- . ':(exclude).github/workflows/**'
          git commit -m "Harden cross-runtime skill adapters"
          git push origin HEAD:agent/operational-skill-adapters
