## Reconciling a sketch or prototype with the selected shape

Use this pass when a mockup, generated screen, clickable prototype, or design exploration already exists. A visual can reveal useful detail, but it is not automatically the selected shape or a complete specification.

Compare each meaningful visual element or implied behavior against the accepted requirements and selected shape:

| Visual element or behavior | Requirement | Shape part | Status | Required action |
|---|---|---|---|---|
| Search field | R2 | B1 | Match | Preserve in breadboard |
| Automatic suggestion panel | — | — | New / unshaped addition | Cut or shape explicitly |
| Error state absent | R5 | B4 | Missing from visual | Add or record as intentionally deferred |
| Blocking modal | R3 | B2 | Conflict | Human decision required |

Use only these statuses:
- `Match`
- `Missing from visual`
- `Conflict`
- `New / unshaped addition`
- `Unclear`

Procedure:
1. Inventory the visual elements, transitions, states, and hidden behavior the prototype implies.
2. Map each one to a requirement and selected shape part when support exists.
3. Mark unsupported additions instead of silently promoting them into scope.
4. Mark required behavior that the visual omits.
5. Surface conflicts for a human decision before breadboarding or implementation.
6. Update the selected planning artifact first when the decision changes intent, then revise the visual or breadboard.

Do not silently treat visual polish as a requirement, infer backend behavior from appearance, or let a generated prototype overrule the selected shape.

