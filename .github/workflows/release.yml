name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          generate_release_notes: true
          make_latest: true
