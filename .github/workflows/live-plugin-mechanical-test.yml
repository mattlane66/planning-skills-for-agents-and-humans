name: Live Claude Code plugin validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository health checks
        shell: bash
        run: |
          set -o pipefail
          bash scripts/check-repo-health.sh | tee /tmp/repo-health.txt

      - name: Build Claude Code plugin bundle
        shell: bash
        run: |
          set -o pipefail
          bash scripts/build-claude-plugin.sh | tee /tmp/plugin-build.txt

      - name: Assert expected bundle surfaces
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/claude-code-plugin/.claude-plugin/plugin.json
          test -f dist/claude-code-plugin/commands/frame.md
          test -f dist/claude-code-plugin/commands/fit-check.md
          test -f dist/claude-code-plugin/commands/breadboard.md
          test -f dist/claude-code-plugin/skills/framing-doc/SKILL.md
          test -f dist/claude-code-plugin/skills/shaping/SKILL.md
          test -f dist/claude-code-plugin/skills/breadboarding/SKILL.md
          grep -q '"name": "planning-skills"' dist/claude-code-plugin/.claude-plugin/plugin.json
          echo "BUNDLE_SURFACES=PASSED" | tee /tmp/bundle-surfaces.txt

      - name: Install Claude Code
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show Claude Code version
        shell: bash
        run: |
          set -o pipefail
          claude --version | tee /tmp/claude-version.txt

      - name: Validate generated plugin with Claude Code
        shell: bash
        run: |
          set -o pipefail
          claude plugin validate "$GITHUB_WORKSPACE/dist/claude-code-plugin" --strict | tee /tmp/plugin-validation.txt
          echo "PLUGIN_VALIDATION=PASSED" | tee -a /tmp/plugin-validation.txt

      - name: Prepare blank live-test repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/planning-skills-live-test
          cd /tmp/planning-skills-live-test
          git init
          cat > source.md <<'EOF'
          # Time comparison application

          Create a terminal application that compares local times across several locations.
          Each location is a column and rows represent hours in a selected time window.
          Users can configure defaults, add or remove locations, and change the date.
          Time-zone and daylight-saving behavior must be accurate.

          Start by planning. Do not implement until a direction and demoable slice are selected.
          EOF

      - name: Execute namespaced slash command when credentials are available
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "LIVE_AGENT_EXECUTION=SKIPPED_NO_ANTHROPIC_API_KEY" | tee /tmp/live-agent-status.txt
            exit 0
          fi

          cd /tmp/planning-skills-live-test
          timeout 300 claude \
            --plugin-dir "$GITHUB_WORKSPACE/dist/claude-code-plugin" \
            --dangerously-skip-permissions \
            -p "/planning-skills:frame source.md Save the result as planning/frame.md. Do not shape or implement yet." \
            | tee /tmp/live-agent-output.txt

          test -f planning/frame.md
          grep -q '^## Source' planning/frame.md
          grep -q '^## Problem' planning/frame.md
          grep -q '^## Outcome' planning/frame.md
          test ! -d src
          echo "LIVE_AGENT_EXECUTION=PASSED" | tee /tmp/live-agent-status.txt
          cp planning/frame.md /tmp/generated-frame.md

      - name: Assemble evidence report
        if: always()
        shell: bash
        run: |
          {
            echo "# Live Claude Code Plugin Validation"
            echo
            echo "## Claude Code version"
            cat /tmp/claude-version.txt 2>/dev/null || echo "Unavailable"
            echo
            echo "## Bundle surfaces"
            cat /tmp/bundle-surfaces.txt 2>/dev/null || echo "Unavailable"
            echo
            echo "## Plugin validation"
            cat /tmp/plugin-validation.txt 2>/dev/null || echo "Unavailable"
            echo
            echo "## Live agent execution"
            cat /tmp/live-agent-status.txt 2>/dev/null || echo "Unavailable"
          } > /tmp/live-plugin-validation-report.md

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-plugin-validation-evidence
          path: |
            /tmp/live-plugin-validation-report.md
            /tmp/generated-frame.md
            /tmp/live-agent-output.txt
          if-no-files-found: ignore
