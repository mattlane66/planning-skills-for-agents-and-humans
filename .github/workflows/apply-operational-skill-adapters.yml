name: Apply operational skill adapters

on:
  push:
    branches:
      - agent/operational-skill-adapters

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/operational-skill-adapters
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install migration dependency
        run: python -m pip install "PyYAML>=6.0.2,<7"

      - name: Apply migration
        run: python scripts/apply-operational-adapters.py

      - name: Sync packaged skills
        run: bash scripts/sync-packaged-skills.sh

      - name: Validate repository
        run: |
          chmod +x scripts/*.sh hooks/*.sh
          bash scripts/check-repo-health.sh

      - name: Commit migrated repository
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No migration changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden cross-runtime skill adapters"
          git push origin HEAD:agent/operational-skill-adapters
