name: Repo health

on:
  pull_request:
  push:
    branches: [main]

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            mcp-server/package-lock.json
            visualizer/package-lock.json

      - name: Build and validate Claude upload skills
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/build_claude_skills.py 2>&1 | tee claude-skill-build.log

      - name: Upload Claude skill diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-skill-build-log
          path: claude-skill-build.log

      - name: Check repository health
        run: bash scripts/check-repo-health.sh
