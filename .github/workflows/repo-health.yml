name: Apply corrected operational skill adapters

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: agent/operational-skill-adapters
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install migration dependency
        run: python -m pip install "PyYAML>=6.0.2,<7"

      - name: Apply migration
        run: python scripts/apply-operational-adapters.py

      - name: Correct fixtures and finalize workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          path = Path('tests/test_codex_plugin.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '        prompt_text = "\n"\n".join(self.manifest["interface"]["defaultPrompt"]).lower()\n',
              '        prompt_text = "\\n".join(self.manifest["interface"]["defaultPrompt"]).lower()\n',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('scripts/validate-frontmatter.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('if len(lines) >= 500:', 'if len(lines) > 500:')
          text = text.replace('must stay under 500 lines', 'must stay at or below 500 lines')
          path.write_text(text, encoding='utf-8')

          path = Path('evals/skill-activation-cases.json')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'Compare alternative shapes before choosing one.',
              'Compare three alternative solution shapes against accepted requirements before choosing one.',
          )
          text = text.replace(
              'Create a dependency-aware build sequence.',
              'Create a dependency-aware implementation sequence for the selected slice.',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('.codex-plugin/plugin.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['interface']['defaultPrompt'][0] = 'Use the framing-doc skill to frame this product idea before implementation.'
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

          cat > .github/workflows/repo-health.yml <<'EOF'
          name: Repo health

          on:
            pull_request:
            push:
              branches: [main]

          jobs:
            health:
              runs-on: ubuntu-latest
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"

                - name: Install validation dependencies
                  run: python -m pip install -r requirements-dev.txt

                - name: Set up Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: "22"
                    cache: npm
                    cache-dependency-path: |
                      mcp-server/package-lock.json
                      visualizer/package-lock.json

                - name: Build and validate Claude upload skills
                  shell: bash
                  run: |
                    set -o pipefail
                    python3 scripts/build_claude_skills.py 2>&1 | tee claude-skill-build.log

                - name: Upload Claude skill diagnostics
                  if: failure()
                  uses: actions/upload-artifact@v4
                  with:
                    name: claude-skill-build-log
                    path: claude-skill-build.log

                - name: Check repository health
                  run: bash scripts/check-repo-health.sh
          EOF
          sed -i 's/^          //' .github/workflows/repo-health.yml

          rm -f \
            .trigger-operational-adapters \
            .github/workflows/apply-operational-skill-adapters.yml \
            scripts/apply-operational-adapters.py

      - name: Sync packaged skills
        run: bash scripts/sync-packaged-skills.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            mcp-server/package-lock.json
            visualizer/package-lock.json

      - name: Validate repository
        shell: bash
        run: |
          set -o pipefail
          chmod +x scripts/*.sh hooks/*.sh scripts/*.py
          bash scripts/check-repo-health.sh 2>&1 | tee repo-health.log

      - name: Upload repository health diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-log
          path: repo-health.log

      - name: Commit completed patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden cross-runtime skill adapters"
          git push origin HEAD:agent/operational-skill-adapters
