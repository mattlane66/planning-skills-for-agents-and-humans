name: Patch README usage guidance

on:
  push:
    branches:
      - agent/explain-when-to-use-skills

permissions:
  contents: write

jobs:
  patch-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explain-when-to-use-skills
          fetch-depth: 0

      - name: Add when-to-use guidance
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          marker = "## Operating philosophy"
          section = r'''## When should I use these skills?

You do not have to begin your idea inside this repo.

Start wherever it is easiest to think: a conversation, a whiteboard, a document, Claude Design, Codex, a rough prototype, or a pile of notes. Explore freely while you are still trying to discover what the idea might be.

Use these skills when the idea becomes important enough that you do not want its meaning to live only inside a conversation or disappear between prompts.

That usually happens when:

- there are several plausible ways to solve the problem
- a prototype looks promising, but you do not yet understand how it should behave
- an agent is about to modify a real codebase
- the work will take days or weeks rather than minutes
- several people or agents need to share the same understanding
- important requirements, boundaries, or decisions could easily be forgotten
- you need to hand the work from exploration into implementation
- the implementation may be drifting away from the original intent

This repo is the bridge between **playing with an idea** and **building it deliberately**.

It does not replace tools such as Claude Design, Codex, Claude Code, Gemini CLI, Cursor, or Spec Kit. It gives those tools better planning material to work from.

### This is a mode switch, not necessarily a tool switch

You can use the same agent for exploration, planning, and implementation. What changes is what you are asking it to do.

During exploration, you might say:

> Help me think through this idea. Show me possibilities.

During planning, you might say:

> Stop proposing finished implementations. Help me clarify the problem, compare the possible approaches, and record the decisions.

During implementation, you might say:

> Build only this selected slice. Preserve these requirements and verify the result against this breadboard.

The skills provide repeatable instructions and artifacts for making those transitions safely.

### A practical workflow

A typical workflow might look like this:

1. **Play with the idea**

   Talk, sketch, make rough screens, inspect the existing product, or create a disposable prototype. Do whatever helps you discover the territory.

2. **Stop when the work starts becoming consequential**

   You have found something worth pursuing, but important questions, alternatives, or assumptions remain.

3. **Use the skill that matches the uncertainty**

   - Use `/framing-doc` when you have messy source material but the problem, outcome, or boundaries are still unclear.
   - Use `/shaping` when you know the problem but need to compare possible solution directions.
   - Use `/breadboarding` when you have selected a direction but need to understand how it actually behaves.
   - Use `/statechart` when one part of the breadboard has meaningful state complexity, such as retries, approvals, timeouts, lifecycle stages, or several valid actions from the same state.
   - Use `/interface-contracts` when the selected slice crosses a meaningful system boundary.
   - Use `/executable-breadboards` when the builder needs concrete examples, expected outputs, edge cases, fixtures, or acceptance tests.
   - Use `/feed-planning-context` when you are ready to give a coding agent the relevant plan without dumping the entire planning history into its context.
   - Use drift checks and `/breadboard-reflection` when implementation exists and you need to compare what was built with what was intended.

4. **Make the human decision**

   The agent can identify criteria, propose alternatives, expose tradeoffs, and show where information is missing. A human selects the direction and the slice that is allowed to move into implementation.

5. **Build one selected slice**

   Give the coding agent a compact context packet containing only the requirements, breadboard rows, contracts, examples, exclusions, and verification target relevant to that slice.

6. **Check the work as it evolves**

   When implementation discoveries change the plan, update the planning artifacts rather than allowing the code and the intended product to quietly diverge.

### Example: starting in Claude Design

You might begin in Claude Design by describing an idea, generating several screens, and changing the interaction until something feels promising.

At that point, do not treat the generated design as a complete specification.

Bring the useful outputs—screens, notes, decisions, unanswered questions, and conversation transcript—into the planning workflow.

You might then:

1. use `/framing-doc` to clarify the problem and desired outcome
2. use `/shaping` to compare the visual concept with other possible approaches
3. select the direction worth pursuing
4. use `/breadboarding` to describe what the user can do, what the system does, and how the parts connect
5. give the selected slice to Codex or another coding agent

Claude Design remains an exploration and visualization surface. These skills turn the useful parts of that exploration into durable product and implementation context.

### Example: starting directly in Codex

You can also begin directly in Codex.

For a small, obvious task, simply ask Codex to make the change.

For a larger or ambiguous task, ask Codex to use the relevant planning skill before editing code. For example:

```text
Use AGENTS.md and shaping/SKILL.md.

Do not implement yet.

Help me identify the requirements, sketch several possible approaches, and compare their fit. Stop before selecting a direction.
```

After you select a direction, Codex can breadboard it, prepare a context packet, and then implement only the selected slice.

You have not changed tools. You have prevented the tool from jumping from a fuzzy request directly into code.

### When not to use the full process

Do not add planning ceremony where it provides no value.

You probably do not need the full workflow for:

- a small copy change
- an obvious and contained bug fix
- a disposable experiment
- a low-risk internal script
- a simple application that can safely be generated and checked in one pass
- a change whose behavior, boundaries, and acceptance conditions are already clear

Even then, an individual skill may still help. For example, you might breadboard an unfamiliar existing workflow without creating a new frame or shaping document.

The rule is not “always run every skill.”

The rule is:

> Use the smallest planning move that prevents an important misunderstanding.'''

          if "## When should I use these skills?" not in text:
              if marker not in text:
                  raise SystemExit(f"Could not find README marker: {marker}")
              text = text.replace(marker, section + "\n\n" + marker, 1)
              path.write_text(text, encoding="utf-8")
          PY

          rm .github/workflows/patch-readme-when-to-use.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/patch-readme-when-to-use.yml
          git commit -m "Explain when to use the planning skills"
          git push