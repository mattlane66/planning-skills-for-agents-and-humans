version: 1
name: planning-skills-for-agents-and-humans
purpose: >-
  Tool-neutral orchestration contract for using this repository as a planning
  and harness layer around agentic implementation work.

principles:
  - planning_before_implementation
  - visual_evidence_requires_explicit_reconciliation
  - bounded_appetite_before_shape_selection
  - human_decision_gates_before_scope_expansion
  - vertical_grouping_before_task_backlog
  - compact_context_before_build
  - execution_contract_before_loop
  - drift_checks_during_build
  - reflection_after_implementation

authority_order:
  - latest_user_instruction
  - selected_slice
  - executable_breadboard
  - selected_interface_contract
  - selected_dumplink_task_group
  - selected_breadboard
  - selected_shaping_direction
  - kickoff_doc_for_orientation_only
  - framing_doc
  - raw_notes_and_transcripts
  - rejected_alternatives_and_brainstorming

modes:
  explore:
    purpose: Understand the source material, current system, and unknowns.
    allowed_outputs: [source_notes, current_state_summary, open_questions, relevant_files_or_artifacts, risks_and_unknowns]
    forbidden: [production_code, selected_direction, implementation_plan]
    exit_gate: source_material_understood

  frame:
    skill: framing-doc
    purpose: Name the current situation, problem, outcome, forces, and boundaries.
    allowed_outputs: [frame, current_situation, current_approach, current_result, problem, outcome, boundaries, criteria_candidates]
    forbidden: [production_code, selected_shape]
    exit_gate: frame_accepted

  criteria:
    skill: shaping
    command_aliases: { claude: /criteria, gemini: /criteria }
    purpose: Define requirements / criteria before proposing mechanisms.
    allowed_outputs: [requirements_table, criteria_status, mechanism_parking_lot, open_criteria_questions]
    forbidden: [solution_shapes, selected_direction, breadboard, production_code]
    exit_gate: requirements_accepted

  appetite:
    skill: shaping
    command_aliases: { claude: /appetite, gemini: /appetite }
    purpose: Set the fixed time or scope budget and cut line that candidate shapes must fit.
    requires: [accepted_requirements]
    allowed_outputs: [appetite, team_shape, review_point, cut_line, accepted_unknowns, spike_threshold]
    forbidden: [unbounded_scope, selected_direction_without_human_choice, production_code]
    exit_gate: appetite_set

  sketch_shapes:
    skill: shaping
    command_aliases: { claude: /sketch-shapes, gemini: /sketch-shapes }
    purpose: Make multiple possible directions visible without selecting one.
    requires: [accepted_requirements, appetite]
    allowed_outputs: [current_baseline, alternative_shapes, shape_parts, appetite_fit_notes, flagged_unknowns, spike_candidates]
    forbidden: [selected_direction_without_human_choice, breadboard, production_code]
    exit_gate: alternatives_visible

  fit_check:
    skill: shaping
    command_aliases: { claude: /fit-check, gemini: /fit-check }
    purpose: Compare candidate shapes against requirements and appetite, then reverse-check mechanisms.
    requires: [candidate_shapes, appetite]
    allowed_outputs: [fit_check, reverse_fit_check, appetite_fit, cut_options, failed_requirements, unjustified_mechanisms, decision_readiness_note]
    forbidden: [selected_direction_without_human_choice, breadboard, production_code]
    exit_gate: decision_ready

  select_shape:
    skill: shaping
    command_aliases: { claude: /select-shape, gemini: /select-shape }
    purpose: Record the human-selected direction or stop with a decision-ready summary.
    requires: [fit_check, appetite]
    allowed_outputs: [selected_direction, appetite_fit, rejected_alternatives, tradeoffs, remaining_unknowns, next_handoff]
    forbidden: [invented_human_decision, production_code]
    exit_gate: shape_selected

  reconcile_sketch:
    skill: sketch-reconciliation
    command_aliases: { claude: /reconcile-sketch, gemini: /reconcile-sketch }
    purpose: Reconcile a visual with planning artifacts without silently changing selected behavior or scope.
    requires: [visual, planning_artifact]
    allowed_outputs: [visual_observations, observation_to_plan_mapping, ambiguities, conflicts, proposed_deltas, accepted_updates, fit_check_impact, ripple_status]
    forbidden: [invented_hidden_behavior, silent_scope_change, visual_as_automatic_source_of_truth, production_code]
    exit_gate: deltas_accepted_rejected_or_deferred

  map_current_state:
    skill: breadboarding
    purpose: Describe how an existing system behaves without turning observed behavior into selected future intent.
    requires: [existing_system_scope]
    allowed_outputs: [current_state_breadboard, places, ui_affordances, non_ui_affordances, stores, wiring, evidence_references, unresolved_observations]
    forbidden: [selected_future_behavior, slice_selection, build_handoff, production_code]
    exit_gate: current_state_breadboard_reviewed

  breadboard:
    skill: breadboarding
    purpose: Make the human-selected shape concrete as a normative selected-design map.
    requires: [selected_direction, appetite]
    allowed_outputs: [selected_design_breadboard, places, ui_affordances, non_ui_affordances, stores, wiring, branches, slice_candidates]
    forbidden: [current_state_as_selected_future_behavior, production_code]
    exit_gate: breadboard_accepted

  statechart:
    skill: statechart
    command_aliases: { claude: /statechart, gemini: /statechart }
    purpose: Derive a transition table and Mermaid statechart for a selected stateful portion of an accepted breadboard.
    requires: [accepted_breadboard, selected_scope_or_slice]
    allowed_outputs: [state_inventory, transition_table, mermaid_statechart, gaps_and_proposed_breadboard_updates]
    forbidden: [production_code, invented_behavior, statechart_as_source_of_truth]
    exit_gate: statechart_reviewed_or_skipped

  slice:
    skill: breadboarding
    purpose: Split the accepted breadboard into demoable increments.
    requires: [accepted_breadboard]
    allowed_outputs: [slice_ids, slice_boundaries, exclusions, dependencies, verification_targets]
    forbidden: [production_code]
    exit_gate: slice_selected

  interface_contract:
    skill: interface-contracts
    purpose: Define plain-language contracts for meaningful boundaries crossed by the selected slice.
    requires: [selected_slice, selected_breadboard]
    allowed_outputs: [contract_ids, boundary_names, inputs, outputs, branches, error_cases, open_decisions]
    forbidden: [production_schema_unless_explicitly_requested]
    exit_gate: contracts_accepted

  executable_breadboard:
    skill: executable-breadboards
    purpose: Add examples, fixtures, expected outputs, edge cases, and tests to a selected slice handoff.
    requires: [selected_slice, selected_breadboard]
    allowed_outputs: [fixtures, example_runs, expected_outputs, expected_state_changes, edge_cases, acceptance_tests]
    forbidden: [production_code_unless_explicitly_requested]
    exit_gate: build_handoff_ready

  dumplink_explore:
    skill: dumplink
    purpose: Expose candidate task groups, risks, dependencies, and appetite cuts before a slice is selected, without creating a build commitment.
    requires: [selected_direction, appetite]
    allowed_outputs: [project_boundary, task_dump, candidate_task_groups, risk_notes, dependency_observations, candidate_scope_cuts, slice_selection_questions]
    forbidden: [committed_build_sequence, acceptance_plan, active_task_group, agent_handoff_packet, production_code]
    exit_gate: selected_slice_or_dumplink_skipped

  dumplink:
    skill: dumplink
    command_aliases: { claude: /dumplink, gemini: /dumplink }
    purpose: Organize work inside a selected slice into vertical task groups, risk states, dependency sequence, scope cuts, and bounded agent handoff packets.
    requires: [selected_direction, appetite, selected_slice]
    allowed_outputs: [project_boundary, task_dump, task_groups, risk_states, dependency_map, build_sequence, scope_cuts, acceptance_checks, agent_handoff_packet]
    forbidden: [horizontal_ticket_backlog, production_code, selected_slice_expansion, scope_expansion_without_appetite_change, build_sequence_without_selected_slice, agent_handoff_without_selected_slice]
    exit_gate: task_group_selected_or_sequence_accepted

  kickoff:
    skill: kickoff-doc
    command_aliases: { claude: /kickoff }
    purpose: Create a derived builder-orientation reference organized by shaped product territory.
    requires: [selected_direction, selected_slice]
    allowed_outputs: [territory, selected_direction, boundaries, system_areas, first_slice, verification_target]
    forbidden: [invented_human_decision, production_code, rejected_alternative_as_active_scope]
    exit_gate: kickoff_reference_ready_or_skipped

  feed_context:
    skill: feed-planning-context
    purpose: Create the compact context packet for implementation.
    requires: [selected_slice]
    allowed_outputs: [context_packet, authority_order, must_preserve_constraints, accepted_appetite, cut_line, non_goals, execution_contract, verification_target]
    forbidden: [whole_planning_stack_dump_by_default, production_code]
    exit_gate: context_packet_ready

  build:
    purpose: Implement only the selected slice or Dumplink task group from the compact context packet.
    requires: [selected_slice, context_packet, execution_contract]
    allowed_outputs: [implementation, tests, verification_results, planning_update_proposals_if_reality_changed, agent_run_log]
    forbidden: [scope_expansion_without_planning_update, discarded_alternative_as_active_scope, silent_plan_change]
    recurring_checks: [drift_check, selected_slice_boundary, active_task_group_boundary, non_goals, verification_target]
    exit_gate: selected_slice_verified

  check_drift:
    command_aliases: { claude: /check-drift, gemini: /check-drift }
    purpose: Check implementation direction against selected planning artifacts.
    allowed_outputs: [no_planning_drift_found, planning_drift_found]
    required_response_shape:
      no_drift: No planning drift found.
      drift: [Selected artifact says, Current implementation direction is, Risk, Recommended move]
    forbidden: [implementation_changes, scope_expansion, new_requirements]

  reflect:
    skill: breadboard-reflection
    purpose: Compare implementation reality to accepted breadboard intent and prepare or apply the explicit human drift decision.
    requires: [implementation_exists, selected_breadboard]
    allowed_outputs: [implementation_reality_record, matches, drift, missing_behavior, accidental_behavior, design_smells, correction_options, drift_decision_status, authorized_planning_updates, authorized_implementation_followups]
    forbidden: [critique_before_recording_reality, silent_breadboard_rewrite, accepted_intent_replaced_without_decision]
    exit_gate: reflection_recorded_and_drift_decided_or_pending

artifacts:
  frame: templates/frame.md
  shaping: templates/shaping.md
  sketch_reconciliation: templates/sketch-reconciliation.md
  breadboard: templates/breadboard.md
  statechart: templates/statechart.md
  slices: templates/slices.md
  interface_contracts: templates/interface-contracts.md
  executable_breadboard: templates/executable-breadboard.md
  dumplink: templates/dumplink.md
  kickoff: templates/kickoff.md
  context_packet: templates/context-packet.md
  drift_check: templates/drift-check.md
  agent_run_log: templates/agent-run-log.md
  orchestration_plan: templates/orchestration-plan.md
  breadboard_reflection: templates/breadboard-reflection.md
  spike: templates/spike.md
  decision_log: templates/decision-log.md
  appetite_card: templates/appetite-card.md

hooks:
  planning_ripple: hooks/planning-ripple.sh
  pre_build_context_check: hooks/pre-build-context-check.sh
  planning_drift_check: hooks/planning-drift-check.sh
