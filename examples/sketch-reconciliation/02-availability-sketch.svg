<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Availability board sketch</title>
  <desc id="desc">A rough comparison table with an always-visible selected date and a natural-language command field.</desc>
  <rect width="760" height="520" fill="#f7f3ea"/>
  <rect x="70" y="48" width="620" height="420" rx="14" fill="#ffffff" stroke="#263238" stroke-width="3"/>
  <text x="100" y="95" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#263238">Tue, March 10</text>
  <line x1="100" y1="116" x2="660" y2="116" stroke="#263238" stroke-width="2"/>
  <text x="185" y="154" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Detroit</text>
  <text x="345" y="154" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Lisbon</text>
  <text x="505" y="154" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Tokyo</text>
  <g font-family="ui-monospace, monospace" font-size="16" fill="#455a64">
    <text x="110" y="202">09:00</text><text x="202" y="202">09:00</text><text x="362" y="202">14:00</text><text x="522" y="202">23:00</text>
    <text x="110" y="242">10:00</text><text x="202" y="242">10:00</text><text x="362" y="242">15:00</text><text x="522" y="242">00:00</text>
    <text x="110" y="282">11:00</text><text x="202" y="282">11:00</text><text x="362" y="282">16:00</text><text x="522" y="282">01:00</text>
  </g>
  <g stroke="#c5ccd1"><line x1="100" y1="216" x2="660" y2="216"/><line x1="100" y1="256" x2="660" y2="256"/><line x1="100" y1="296" x2="660" y2="296"/></g>
  <rect x="100" y="372" width="560" height="58" rx="8" fill="#eef4ff" stroke="#4b6cb7" stroke-width="2"/>
  <text x="122" y="407" font-family="system-ui, sans-serif" font-size="17" fill="#334e68">Show Lisbon and Tokyo next Friday</text>
  <path d="M640 88 C700 78 704 48 674 26" fill="none" stroke="#d14b3f" stroke-width="3"/>
  <text x="505" y="24" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#d14b3f">date always visible</text>
</svg>
